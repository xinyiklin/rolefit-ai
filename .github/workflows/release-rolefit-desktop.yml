name: RoleFit desktop release

on:
  push:
    tags:
      - "rolefit-v*"

permissions:
  contents: read

concurrency:
  group: rolefit-desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      commit: ${{ steps.contract.outputs.commit }}
      tag: ${{ steps.contract.outputs.tag }}
      version: ${{ steps.contract.outputs.version }}
    steps:
      - name: Checkout complete release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate tag, package version, and main ancestry
        id: contract
        run: node apps/role-fit-ai/scripts/desktop-release-contract.mjs

      - name: Install the locked workspace
        run: npm ci

      # The packaged RoleFit app consumes both private source packages, so a
      # signed tag must pass each owning package gate as well as the app gate.
      - name: Check shared engine
        run: npm run check --workspace packages/engine

      - name: Check shared editor
        run: npm run check --workspace packages/editor

      - name: Check RoleFit
        run: npm run check --workspace apps/role-fit-ai

      - name: Probe release contracts
        run: npm run test:desktop:release --workspace apps/role-fit-ai

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            machine: arm64
          - arch: x64
            runner: macos-15-intel
            machine: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    environment:
      name: rolefit-macos-signing
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.commit }}
          fetch-depth: 1
          persist-credentials: false

      - name: Confirm native runner and commit
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
          EXPECTED_MACHINE: ${{ matrix.machine }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test "$(uname -m)" = "$EXPECTED_MACHINE"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          architecture: ${{ matrix.arch }}
          package-manager-cache: false

      - name: Install the locked workspace
        run: npm ci

      - name: Prepare ephemeral macOS signing material
        shell: bash
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_CSC_IDENTITY: ${{ secrets.MAC_CSC_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            MAC_CERTIFICATE_BASE64 \
            MAC_CERTIFICATE_PASSWORD \
            MAC_CSC_IDENTITY \
            APPLE_API_KEY_BASE64 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required rolefit-macos-signing secret is missing: $name"
              missing=1
            fi
          done
          test "$missing" -eq 0

          keychain_path="$RUNNER_TEMP/rolefit-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/rolefit-signing.p12"
          api_key_path="$RUNNER_TEMP/rolefit-notary-api-key.p8"
          keychain_password="$(openssl rand -hex 32)"

          printf '%s' "$MAC_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$api_key_path"
          chmod 600 "$certificate_path" "$api_key_path"
          test -s "$certificate_path"
          test -s "$api_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" \
            | grep -F -- "\"$MAC_CSC_IDENTITY\"" > /dev/null

          {
            printf 'APPLE_API_KEY_PATH=%s\n' "$api_key_path"
          } >> "$GITHUB_ENV"

      - name: Make signed and notarized macOS artifacts
        env:
          ROLEFIT_RELEASE_BUILD: "1"
          MAC_CSC_IDENTITY: ${{ secrets.MAC_CSC_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: >-
          npm run make:desktop --workspace apps/role-fit-ai --
          --arch=${{ matrix.arch }} --platform=darwin

      - name: Smoke packaged macOS application
        run: >-
          npm run test:desktop:packaged --workspace apps/role-fit-ai --
          --arch=${{ matrix.arch }} --platform=darwin

      - name: Collect deterministic macOS artifacts
        run: >-
          npm run collect:desktop:artifacts --workspace apps/role-fit-ai --
          --arch=${{ matrix.arch }} --platform=darwin --checksums=false

      - name: Verify packaged app and ZIP signature
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          app_path="apps/role-fit-ai/.forge/out/RoleFit Local Companion-darwin-${RELEASE_ARCH}/RoleFit Local Companion.app"
          test -d "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          zip_path="apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-${RELEASE_VERSION}-macos-${RELEASE_ARCH}.zip"
          zip_verify_root="$RUNNER_TEMP/rolefit-zip-verify"
          test -s "$zip_path"
          mkdir "$zip_verify_root"
          ditto -x -k "$zip_path" "$zip_verify_root"
          zip_app_path="$zip_verify_root/RoleFit Local Companion.app"
          test -d "$zip_app_path"
          codesign --verify --deep --strict --verbose=2 "$zip_app_path"
          xcrun stapler validate "$zip_app_path"
          spctl --assess --type execute --verbose=4 "$zip_app_path"

      - name: Notarize, staple, and verify DMG
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          dmg_path="apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-${RELEASE_VERSION}-macos-${RELEASE_ARCH}.dmg"
          test -s "$dmg_path"
          codesign --verify --strict --verbose=2 "$dmg_path"
          xcrun notarytool submit "$dmg_path" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          codesign --verify --strict --verbose=2 "$dmg_path"
          spctl --assess \
            --type open \
            --context context:primary-signature \
            --verbose=4 \
            "$dmg_path"

      - name: Verify macOS release assets
        run: >-
          node apps/role-fit-ai/scripts/desktop-release-assets.mjs
          --version "${{ needs.validate.outputs.version }}"
          --platform macos
          --arch "${{ matrix.arch }}"
          --root apps/role-fit-ai/.forge/release

      - name: Upload verified macOS release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rolefit-release-macos-${{ matrix.arch }}
          path: |
            apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-${{ needs.validate.outputs.version }}-macos-${{ matrix.arch }}.dmg
            apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-${{ needs.validate.outputs.version }}-macos-${{ matrix.arch }}.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Remove macOS signing material
        if: always()
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/rolefit-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/rolefit-signing.p12"
          rm -f "$RUNNER_TEMP/rolefit-notary-api-key.p8"
          rm -rf "$RUNNER_TEMP/rolefit-zip-verify"

  build-windows:
    name: Build Windows x64
    needs: validate
    runs-on: windows-2025
    timeout-minutes: 60
    environment:
      name: rolefit-windows-signing
    steps:
      - name: Checkout validated release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.commit }}
          fetch-depth: 1
          persist-credentials: false

      - name: Confirm native runner and commit
        shell: pwsh
        env:
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          if ((git rev-parse HEAD) -ne $env:EXPECTED_COMMIT) {
            throw "Checkout does not match the validated release commit."
          }
          if ([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -ne "X64") {
            throw "Windows release must run on native x64."
          }

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          architecture: x64
          package-manager-cache: false

      - name: Install the locked workspace
        run: npm ci

      - name: Probe native Windows CLI execution and cleanup
        shell: pwsh
        run: npm run test:desktop:windows-runtime --workspace apps/role-fit-ai

      - name: Prepare ephemeral Windows signing material
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $missing = @()
          foreach ($name in @("WINDOWS_CERTIFICATE_BASE64", "WINDOWS_CERTIFICATE_PASSWORD")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
              Write-Error "Required rolefit-windows-signing secret is missing: $name"
            }
          }
          if ($missing.Count -gt 0) {
            throw "Windows signing material is incomplete."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "rolefit-signing.pfx"
          try {
            $certificateBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          } catch {
            throw "WINDOWS_CERTIFICATE_BASE64 is not valid base64."
          }
          if ($certificateBytes.Length -eq 0) {
            throw "WINDOWS_CERTIFICATE_BASE64 decoded to an empty file."
          }
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)
          "WIN_CSC_FILE=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Make signed Windows installer
        shell: pwsh
        env:
          ROLEFIT_RELEASE_BUILD: "1"
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: >-
          npm run make:desktop --workspace apps/role-fit-ai --
          --arch=x64 --platform=win32

      - name: Smoke packaged Windows application
        shell: pwsh
        run: >-
          npm run test:desktop:packaged --workspace apps/role-fit-ai --
          --arch=x64 --platform=win32

      - name: Collect deterministic Windows artifact
        shell: pwsh
        run: >-
          npm run collect:desktop:artifacts --workspace apps/role-fit-ai --
          --arch=x64 --platform=win32 --checksums=false

      - name: Verify packaged app and installer Authenticode signatures
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          $packagedApp = "apps/role-fit-ai/.forge/out/RoleFit Local Companion-win32-x64/RoleFitLocalCompanion.exe"
          $installer = "apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-$env:RELEASE_VERSION-windows-x64.exe"
          foreach ($path in @($packagedApp, $installer)) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Expected signed Windows file is missing: $path"
            }
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ($signature.Status -ne [System.Management.Automation.SignatureStatus]::Valid) {
              throw "Windows Authenticode signature is not valid for $path`: $($signature.Status)"
            }
            if ($null -eq $signature.SignerCertificate) {
              throw "Windows file has no signer certificate: $path"
            }
            if ($null -eq $signature.TimeStamperCertificate) {
              throw "Windows Authenticode signature has no trusted timestamp: $path"
            }
          }

      - name: Install, smoke, and uninstall Windows installer
        shell: pwsh
        run: >-
          npm run test:desktop:windows-installer --workspace apps/role-fit-ai --
          --installer=apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-${{ needs.validate.outputs.version }}-windows-x64.exe

      - name: Verify Windows release asset
        shell: pwsh
        run: >-
          node apps/role-fit-ai/scripts/desktop-release-assets.mjs
          --version "${{ needs.validate.outputs.version }}"
          --platform windows
          --arch x64
          --root apps/role-fit-ai/.forge/release

      - name: Upload verified Windows release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rolefit-release-windows-x64
          path: apps/role-fit-ai/.forge/release/RoleFit-Local-Companion-${{ needs.validate.outputs.version }}-windows-x64.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Remove Windows signing material
        if: always()
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "rolefit-signing.pfx"
          Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue

  publish:
    name: Publish verified GitHub Release
    needs:
      - validate
      - build-macos
      - build-windows
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: rolefit-release
    permissions:
      contents: write
    steps:
      - name: Checkout release publisher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.commit }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download all platform artifacts without merging names
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: rolefit-release-*
          path: apps/role-fit-ai/.forge/downloaded-release
          merge-multiple: false

      - name: Create draft, verify assets, and publish
        env:
          GH_TOKEN: ${{ github.token }}
          ROLEFIT_RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          ROLEFIT_RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          ROLEFIT_RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          ROLEFIT_RELEASE_ASSETS_DIR: apps/role-fit-ai/.forge/downloaded-release
        run: node apps/role-fit-ai/scripts/publish-desktop-release.mjs
