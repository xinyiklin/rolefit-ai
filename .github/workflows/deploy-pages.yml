name: RoleFit AI Pages demo

# Builds the Vite frontend and publishes the static bundle to GitHub Pages.
# Note: this is a static-only demo. Anything that calls the local Node server
# (AI polish, job import, the on-disk tracker) will not function here;
# the hosted build is the UI shell only.

on:
  push:
    branches: [main]
    paths:
      - "apps/role-fit-ai/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish before the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (base path scoped to the project page)
        run: npm run build --workspace apps/role-fit-ai -- --base=/rolefit-ai/

      - name: Add SPA 404 fallback
        run: cp apps/role-fit-ai/dist/index.html apps/role-fit-ai/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/role-fit-ai/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
