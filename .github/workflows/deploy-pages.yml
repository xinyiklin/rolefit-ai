name: RoleFit AI product site

# Publishes only the static product/download entry. The full RoleFit renderer,
# loopback API, provider bridge, and workspace remain companion-served locally.

on:
  pull_request:
    paths:
      - "apps/role-fit-ai/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/release-rolefit-desktop.yml"
  push:
    branches: [main]
    paths:
      - "apps/role-fit-ai/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/release-rolefit-desktop.yml"
  workflow_dispatch:

permissions: {}

# Cancel superseded PR verification without queueing it against a main deploy.
concurrency:
  group: rolefit-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: RoleFit verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check shared engine
        run: npm run check --workspace packages/engine

      - name: Check shared editor
        run: npm run check --workspace packages/editor

      - name: Check RoleFit and build the isolated product site
        run: npm run check --workspace apps/role-fit-ai

      - name: Probe RoleFit server lifecycle
        run: npm run test:server-lifecycle --workspace apps/role-fit-ai

      - name: Probe desktop release contracts
        run: npm run test:desktop:release --workspace apps/role-fit-ai

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/role-fit-ai/dist-landing

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
